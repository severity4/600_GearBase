  <script>
    // Global state
    let allEquipment = [];
    let allTypes = [];
    let catalogData = []; // Equipment types with availability counts
    let cart = [];
    let selectedCategory = null;
    let filteredEquipment = [];

    // ==================== INITIALIZATION ====================

    onReady(async () => {
      await loadEquipment();
      setupEventListeners();
      renderCategoryButtons();
      renderProductList(filteredEquipment);
    });

    function setupEventListeners() {
      // Search
      document.getElementById('search-input').addEventListener('input', debounce(filterAndRender, 300));

      // Sidebar
      document.getElementById('toggle-sidebar').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('active');
      });
      document.getElementById('close-sidebar').addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('active');
      });

      // Category filter (exclude tab buttons which share the .category-btn class)
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('category-btn') && !e.target.classList.contains('tab-btn')) {
          document.querySelectorAll('.category-btn:not(.tab-btn)').forEach(btn => btn.classList.remove('active'));
          e.target.classList.add('active');
          selectedCategory = e.target.dataset.category || null;
          filterAndRender();
        }
      });

      // Status filter
      document.addEventListener('change', (e) => {
        if (e.target.classList.contains('status-filter')) {
          filterAndRender();
        }
      });

      // Reset filters
      document.getElementById('reset-filters').addEventListener('click', () => {
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.status-filter').forEach(cb => cb.checked = true);
        selectedCategory = null;
        document.getElementById('search-input').value = '';
        filterAndRender();
      });

      // Checkout
      document.getElementById('checkout-btn').addEventListener('click', openCheckoutModal);
    }

    // ==================== DATA LOADING ====================

    async function loadEquipment() {
      try {
        catalogData = (await API.getEquipmentCatalog()) || [];
        // Use catalog data as the display source (grouped by type with availability)
        allEquipment = catalogData.map(type => ({
          type_id: type.type_id,
          type_name: type.type_name,
          category: type.category,
          sub_category: type.sub_category,
          brand: type.brand,
          model: type.model,
          daily_rate: type.daily_rate,
          replacement_value: type.replacement_value,
          deposit_required: type.deposit_required,
          description: type.description,
          total_units: type.total_units,
          available_units: type.available_units,
          accessories: type.accessories || [],
          is_consumable: type.is_consumable
        }));

        filteredEquipment = [...allEquipment];
      } catch (error) {
        showError('載入器材數據失敗');
        console.error(error);
      }
    }

    // ==================== FILTERING ====================

    function filterAndRender() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const showOnlyAvailable = document.querySelector('.status-filter') ? document.querySelector('.status-filter').checked : true;

      filteredEquipment = allEquipment.filter(item => {
        // Search filter
        const matchesSearch = !searchTerm ||
          item.type_name.toLowerCase().includes(searchTerm) ||
          (item.brand && item.brand.toLowerCase().includes(searchTerm)) ||
          (item.model && item.model.toLowerCase().includes(searchTerm)) ||
          (item.category && item.category.toLowerCase().includes(searchTerm));

        // Category filter
        const matchesCategory = !selectedCategory || item.category === selectedCategory;

        // Availability filter
        const matchesAvail = !showOnlyAvailable || item.available_units > 0;

        return matchesSearch && matchesCategory && matchesAvail;
      });

      renderProductList(filteredEquipment);
    }

    // ==================== CATEGORY BUTTONS ====================

    function renderCategoryButtons() {
      const container = document.getElementById('category-buttons');
      const categories = ['camera', 'lens', 'audio', 'lighting', 'monitor', 'transmission', 'tripod', 'motion', 'teleprompter', 'accessory', 'prop_furniture', 'prop_wardrobe', 'prop_set', 'prop_fx', 'prop_vehicle', 'prop_other'];
      const categoryLabels = {
        'camera': '攝影機',
        'lens': '鏡頭',
        'audio': '音頻',
        'lighting': '燈光',
        'monitor': '監看',
        'transmission': '傳輸',
        'tripod': '三腳架',
        'motion': '運動鏡頭',
        'teleprompter': '提詞器',
        'accessory': '配件',
        'prop_furniture': '道具-家具',
        'prop_wardrobe': '道具-服裝',
        'prop_set': '道具-場景',
        'prop_fx': '道具-特效',
        'prop_vehicle': '道具-車輛',
        'prop_other': '道具-其他'
      };

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.dataset.category = cat;
        btn.textContent = categoryLabels[cat] || cat;
        container.appendChild(btn);
      });
    }

    // ==================== PRODUCT LIST ====================

    function renderProductList(equipment) {
      const container = document.getElementById('product-list');
      const emptyState = document.getElementById('empty-state');
      const cartSummary = document.getElementById('cart-summary');

      clearElement(container);

      if (equipment.length === 0) {
        container.style.display = 'none';
        emptyState.style.display = 'block';
        cartSummary.style.display = 'none';
        return;
      }

      container.style.display = 'grid';
      emptyState.style.display = 'none';
      if (cart.length > 0) {
        cartSummary.style.display = 'block';
      }

      equipment.forEach(item => {
        const card = document.createElement('div');
        card.className = 'product-card';

        const inCart = cart.some(c => c.type_id === item.type_id);
        const avail = item.available_units;
        const total = item.total_units;
        let availClass = 'in-stock';
        let availText = `可租 ${avail}`;
        if (avail === 0) { availClass = 'out-of-stock'; availText = '已租完'; }
        else if (avail <= 2) { availClass = 'low-stock'; availText = `僅剩 ${avail}`; }

        card.innerHTML = `
          <div class="product-image">
            ${getCategoryEmoji(item.category)}
          </div>
          <div class="product-info">

    function toggleCart(typeId, typeName, dailyRate) {
      const existingItem = cart.find(c => c.type_id === typeId);

      if (existingItem) {
        cart = cart.filter(c => c.type_id !== typeId);
      } else {
        cart.push({
          type_id: typeId,
          type_name: typeName,
          daily_rate: dailyRate,
          quantity: 1
        });
      }

      updateCartDisplay();
      filterAndRender();
    }

    function updateCartDisplay() {
      const cartSummary = document.getElementById('cart-summary');
      const cartCount = document.getElementById('cart-count');
      const cartTotal = document.getElementById('cart-total');

      if (cart.length === 0) {
        cartSummary.style.display = 'none';
        return;
      }

      cartSummary.style.display = 'block';
      cartCount.textContent = cart.length;

      const total = cart.reduce((sum, item) => sum + item.daily_rate, 0);
      cartTotal.textContent = formatCurrency(total);
    }

    async function submitRentalRequest(e) {
      const form = document.getElementById('checkout-form');
      const validation = validateForm(form);

      if (!validation.valid) {
        showError(validation.errors[0]);
        return;
      }

      const formData = getFormData(form);

      // Check if customer exists, if not create
      try {
        // Find existing customer by phone or email
        const allCustomers = (await API.getCustomers()) || [];
        let customer = allCustomers.find(c =>
          !isSoftDeleted(c) && (
            (formData.email && c.email === formData.email) ||
            (formData.phone && c.phone === formData.phone)
          )
        );

        if (!customer) {
          await API.createCustomer({
            name: formData.name,
            company_name: formData.company_name || '',
            phone: formData.phone,
            email: formData.email || ''
          });

          const updatedCustomers = (await API.getCustomers()) || [];
          customer = updatedCustomers.find(c =>
            !isSoftDeleted(c) && c.phone === formData.phone
          );
        }

        // Create rental
        const rentalData = {
          customer_id: customer.customer_id,
          start_date: formData.start_date,
          end_date: formData.end_date,
          notes: formData.notes,
          status: 'draft',
          total_amount: 0,
          paid_amount: 0
        };

        const rental = await API.createRental(rentalData);

        // Create rental items with type_id for proper rate snapshotting
        for (const item of cart) {
          await API.createRentalItem({
            rental_id: rental.rental_id,
            unit_id: '',
            type_id: item.type_id,
            quantity: item.quantity || 1
          });
        }

        showSuccess('租借申請已提交！我們將盡快與您聯繫');
        document.querySelector('.modal-overlay').remove();

        // Clear cart
        cart = [];
        updateCartDisplay();

        // Reset form
        setTimeout(() => {
          document.getElementById('search-input').value = '';
          filterAndRender();
        }, 1500);
      } catch (error) {
        showError('申請提交失敗: ' + error.message);
      }
    }

    async function loadVenueDetailCalendar(venueId, date) {
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const yearMonth = `${year}-${String(month).padStart(2, '0')}`;
      const containerId = `venue-detail-cal-${venueId}`;
      const container = document.getElementById(containerId);
      if (!container) return;

      try {
        const scheduleData = (await API.getVenueMonthlySchedule(venueId, yearMonth)) || {};
        renderVenueMiniCalendar(container, venueId, year, month, scheduleData.booked_dates || []);
      } catch (e) {
        container.innerHTML = '<div style="color:var(--text-secondary); font-size:12px;">載入日曆失敗</div>';
      }
    }

    function renderVenueMiniCalendar(container, venueId, year, month, bookedDates) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const firstDay = new Date(year, month - 1, 1);
      const lastDay = new Date(year, month, 0);
      const startDow = firstDay.getDay();

      const days = ['日', '一', '二', '三', '四', '五', '六'];

      let html = `
        <div class="venue-cal-nav">
          <button onclick="navVenueCal('${venueId}', ${year}, ${month}, -1)">&lt;</button>
          <span>${year} 年 ${month} 月</span>
          <button onclick="navVenueCal('${venueId}', ${year}, ${month}, 1)">&gt;</button>
        </div>
        <div class="venue-cal">
        ${days.map(d => `<div class="venue-cal-header">${d}</div>`).join('')}
      `;

      // Empty cells before first day
      for (let i = 0; i < startDow; i++) {
        html += '<div class="venue-cal-day other"></div>';
      }

      for (let d = 1; d <= lastDay.getDate(); d++) {
        const dateObj = new Date(year, month - 1, d);
        const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isPast = dateObj < today;
        const isBooked = bookedDates.includes(dateStr);

        let cls = 'venue-cal-day';
        if (isPast) cls += ' past';
        else if (isBooked) cls += ' booked';
        else cls += ' available';

        html += `<div class="${cls}">${d}</div>`;
      }

      html += '</div>';
      container.innerHTML = html;
    }

    function navVenueCal(venueId, year, month, delta) {
      const newDate = new Date(year, month - 1 + delta, 1);
      loadVenueDetailCalendar(venueId, newDate);
    }

    function openVenueBookingModal(venueId) {
      const venue = allVenues.find(v => v.venue_id === venueId);
      if (!venue) return;

      const rateOptions = [`<option value="hourly">時租 (${formatCurrency(venue.hourly_rate)}/時)</option>`];
      if (venue.half_day_rate) rateOptions.push(`<option value="half_day">半日租 (${formatCurrency(venue.half_day_rate)}/4hr)</option>`);
      if (venue.daily_rate) rateOptions.push(`<option value="daily">日租 (${formatCurrency(venue.daily_rate)}/天)</option>`);

      const modal = new Modal(`預約 ${escapeHtml(venue.name)}`, `
        <form id="venue-booking-form">
          <input type="hidden" name="venue_id" value="${venueId}">

          <div class="rental-form-section">
            <div class="rental-form-title">個人資訊</div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">姓名</label>
                <input type="text" name="customer_name" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">公司名稱</label>
                <input type="text" name="company_name" class="form-input">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">電話</label>
                <input type="tel" name="phone" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">電郵</label>
                <input type="email" name="email" class="form-input">
              </div>
            </div>
          </div>

          <div class="rental-form-section">
            <div class="rental-form-title">預約時段</div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">開始時間</label>
                <input type="datetime-local" name="booking_start" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label required">結束時間</label>
                <input type="datetime-local" name="booking_end" class="form-input" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">計費方式</label>
                <select name="rate_type" class="form-select" required>
                  ${rateOptions.join('')}
                </select>
              </div>
              <div class="form-group">
                <label class="form-label required">數量</label>
                <input type="number" name="rate_quantity" class="form-input" value="1" min="1" step="0.5" required>
              </div>
            </div>
          </div>

          <div class="rental-form-section">
            <div class="rental-form-title">其他</div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">預計人數</label>
                <input type="number" name="attendee_count" class="form-input" min="1">
              </div>
              <div class="form-group">
                <label class="form-label">使用目的</label>
                <input type="text" name="use_purpose" class="form-input" placeholder="例：商品攝影">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">特殊需求</label>
              <textarea name="special_requirements" class="form-textarea" placeholder="例：需全遮光、需佈置"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">備註</label>
              <textarea name="notes" class="form-textarea"></textarea>
            </div>
            <div class="form-checkbox">
              <input type="checkbox" name="accept_terms" required>
              <label>我同意場地租借條款及細則</label>
            </div>
          </div>
        </form>
      `, `
        <button class="btn btn-secondary" onclick="document.querySelector('.modal-overlay').remove()">取消</button>
        <button class="btn btn-primary" onclick="submitVenueBooking(event)">提交預約</button>
      `);

      modal.open();
    }

    async function submitVenueBooking(e) {
      const form = document.getElementById('venue-booking-form');
      const validation = validateForm(form);

      if (!validation.valid) {
        showError(validation.errors[0]);
        return;
      }

      const formData = getFormData(form);

      try {
        // Find or create customer
        const allCustomers = (await API.getCustomers()) || [];
        let customer = allCustomers.find(c =>
          !isSoftDeleted(c) && (
            (formData.email && c.email === formData.email) ||
            (formData.phone && c.phone === formData.phone)
          )
        );

        if (!customer) {
          await API.createCustomer({
            name: formData.customer_name,
            company_name: formData.company_name || '',
            phone: formData.phone,
            email: formData.email || ''
          });
          const updatedCustomers = (await API.getCustomers()) || [];
          customer = updatedCustomers.find(c => !isSoftDeleted(c) && c.phone === formData.phone);
        }

        // Create venue booking
        const bookingData = {
          venue_id: formData.venue_id,
          customer_id: customer.customer_id,
          booking_start: formData.booking_start,
          booking_end: formData.booking_end,
          rate_type: formData.rate_type,
          rate_quantity: formData.rate_quantity || 1,
          attendee_count: formData.attendee_count || '',
          use_purpose: formData.use_purpose || '',
          special_requirements: formData.special_requirements || '',
          notes: formData.notes || ''
        };

        await API.createVenueBooking(bookingData);
        showSuccess('場地預約已提交！我們將盡快與您確認');
        document.querySelector('.modal-overlay').remove();
      } catch (error) {
        showError('預約提交失敗: ' + error.message);
      }
    }

    // ==================== RENTAL LOOKUP (Email + Verification Code) ====================

    let lookupEmail = '';

    // Enter key support
    document.getElementById('lookup-email').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendVerificationCode();
    });
    document.getElementById('lookup-code').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') verifyCode();
    });

    async function sendVerificationCode() {
      const emailInput = document.getElementById('lookup-email');
      const email = emailInput.value.trim();
      const msgEl = document.getElementById('lookup-email-msg');
      const btn = document.getElementById('send-code-btn');

      if (!email) {
        msgEl.innerHTML = '<span style="color:var(--danger-color, #dc2626);">請輸入 Email</span>';
        return;
      }

      btn.disabled = true;
      btn.textContent = '發送中...';
      msgEl.innerHTML = '';

      try {
        const result = await API.sendLookupVerificationCode(email);
        if (result.success) {
          lookupEmail = email;
          // Switch to step 2
          document.getElementById('lookup-step-email').style.display = 'none';
          document.getElementById('lookup-step-code').style.display = 'block';
          document.getElementById('lookup-email-display').textContent = email;
          document.getElementById('lookup-code').value = '';
          document.getElementById('lookup-code').focus();
          document.getElementById('lookup-results').innerHTML = '';
          showSuccess(result.message);
        } else {
          msgEl.innerHTML = `<span style="color:var(--danger-color, #dc2626);">${escapeHtml(result.message)}</span>`;
        }
      } catch (error) {
        msgEl.innerHTML = `<span style="color:var(--danger-color, #dc2626);">發送失敗：${escapeHtml(error.message)}</span>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '發送驗證碼';
      }
    }

    async function resendCode() {
      if (!lookupEmail) return;
      document.getElementById('lookup-code').value = '';
      document.getElementById('lookup-code-msg').innerHTML = '';

      try {
        const result = await API.sendLookupVerificationCode(lookupEmail);
        if (result.success) {
          showSuccess('驗證碼已重新發送');
        } else {
          showWarning(result.message);
        }
      } catch (error) {
        showError('發送失敗：' + error.message);
      }
    }

    function resetLookup() {
      lookupEmail = '';
      document.getElementById('lookup-step-email').style.display = 'block';
      document.getElementById('lookup-step-code').style.display = 'none';
      document.getElementById('lookup-email').value = '';
      document.getElementById('lookup-email-msg').innerHTML = '';
      document.getElementById('lookup-results').innerHTML = '';
      document.getElementById('lookup-email').focus();
    }

    async function verifyCode() {
      const code = document.getElementById('lookup-code').value.trim();
      const msgEl = document.getElementById('lookup-code-msg');
      const resultsEl = document.getElementById('lookup-results');
      const btn = document.getElementById('verify-btn');

      if (!code || code.length !== 6) {
        msgEl.innerHTML = '<span style="color:var(--danger-color, #dc2626);">請輸入 6 位驗證碼</span>';
        return;
      }

      btn.disabled = true;
      btn.textContent = '驗證中...';
      msgEl.innerHTML = '';

      try {
        const data = (await API.verifyAndLookup(lookupEmail, code)) || {};

        if (!data.verified) {
          msgEl.innerHTML = `<span style="color:var(--danger-color, #dc2626);">${escapeHtml(data.message)}</span>`;
          btn.disabled = false;
          btn.textContent = '驗證並查詢';
          return;
        }

        if (!data.found) {
          resultsEl.innerHTML = `<div class="lookup-empty">${escapeHtml(data.message || '查無紀錄')}</div>`;
          btn.disabled = false;
          btn.textContent = '驗證並查詢';
          return;
        }

        // Render results
        let html = '';

        if (data.customer_name) {
          html += `<div style="text-align:center; color:white; margin-bottom:16px; font-size:18px; font-weight:600;">${escapeHtml(data.customer_name)} 的紀錄</div>`;
        }

        // Rental records
        if (data.rentals && data.rentals.length > 0) {
          html += '<div class="lookup-card"><h3>📋 器材租借</h3>';
          data.rentals.forEach(r => {
            html += `
              <div class="lookup-item">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                  <strong>${r.rental_id}</strong>
                  <span class="lookup-status ${r.status}">${r.status_label}</span>
                </div>
                <div style="font-size:13px; color:var(--text-secondary);">
                  ${r.rental_start ? formatDateDisplay(r.rental_start) : '-'} ~ ${r.rental_end ? formatDateDisplay(r.rental_end) : '-'}
                </div>
                ${r.items && r.items.length ? `<div style="font-size:12px; margin-top:4px; color:var(--text-secondary);">器材：${r.items.map(i => escapeHtml(i.type_name)).join('、')}</div>` : ''}
                <div style="display:flex; justify-content:space-between; margin-top:6px; font-size:13px;">
                  <span>金額：${formatCurrency(r.total_amount)}</span>
                  <span>已付：${formatCurrency(r.paid_amount)}</span>
                  ${r.total_amount - r.paid_amount > 0 ? `<span style="color:var(--danger-color, #dc2626); font-weight:600;">未付：${formatCurrency(r.total_amount - r.paid_amount)}</span>` : '<span style="color:var(--success-color, #16a34a);">已結清</span>'}
                </div>
              </div>`;
          });
          html += '</div>';
        }

        // Venue bookings
        if (data.bookings && data.bookings.length > 0) {
          html += '<div class="lookup-card"><h3>📅 場地預約</h3>';
          data.bookings.forEach(b => {
            html += `
              <div class="lookup-item">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                  <strong>${b.booking_id}</strong>
                  <span class="lookup-status ${b.status}">${b.status_label}</span>
                </div>
                <div style="font-size:13px;">場地：${escapeHtml(b.venue_name || '-')}</div>
                <div style="font-size:13px; color:var(--text-secondary);">${b.booking_start || '-'} ~ ${b.booking_end || '-'}</div>
                <div style="font-size:13px; margin-top:4px;">金額：${formatCurrency(b.total_amount)}</div>
              </div>`;
          });
          html += '</div>';
        }

        if ((!data.rentals || data.rentals.length === 0) && (!data.bookings || data.bookings.length === 0)) {
          html += '<div class="lookup-empty">目前沒有租借或預約紀錄</div>';
        }

        resultsEl.innerHTML = html;

        // Hide the code form after success
        document.getElementById('lookup-step-code').style.display = 'none';

      } catch (error) {
        msgEl.innerHTML = `<span style="color:var(--danger-color, #dc2626);">查詢失敗：${escapeHtml(error.message)}</span>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '驗證並查詢';
      }
    }
  </script>
</head>
</html>

  <?!= include('JavaScript') ?>
  <script>
    // Global state
    let allEquipment = [];
    let allTypes = [];
    let cart = [];
    let selectedCategory = null;
    let filteredEquipment = [];

    // ==================== INITIALIZATION ====================

    onReady(async () => {
      await loadEquipment();
      setupEventListeners();
      renderCategoryButtons();
      renderProductList(allEquipment);
    });

    function setupEventListeners() {
      // Search
      document.getElementById('search-input').addEventListener('input', debounce(filterAndRender, 300));

      // Sidebar
      document.getElementById('toggle-sidebar').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('active');
      });
      document.getElementById('close-sidebar').addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('active');
      });

      // Category filter
      document.addEventListener('click', (e) => {
        if (e.target.classList.contains('category-btn')) {
          document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
          e.target.classList.add('active');
          selectedCategory = e.target.dataset.category || null;
          filterAndRender();
        }
      });

      // Status filter
      document.addEventListener('change', (e) => {
        if (e.target.classList.contains('status-filter')) {
          filterAndRender();
        }
      });

      // Reset filters
      document.getElementById('reset-filters').addEventListener('click', () => {
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.status-filter').forEach(cb => cb.checked = true);
        selectedCategory = null;
        document.getElementById('search-input').value = '';
        filterAndRender();
      });

      // Checkout
      document.getElementById('checkout-btn').addEventListener('click', openCheckoutModal);
    }

    // ==================== DATA LOADING ====================

    async function loadEquipment() {
      try {
        allTypes = await API.getEquipmentTypes();
        allEquipment = await API.getAvailableEquipment(formatDate(new Date()), formatDate(new Date(new Date().getTime() + 86400000)));

        // Enrich equipment with type info
        allEquipment = allEquipment.map(unit => {
          const type = allTypes.find(t => t.type_id === unit.type_id);
          return {
            ...unit,
            type_name: type ? type.type_name : 'Unknown',
            category: type ? type.category : 'other',
            daily_rate: type ? type.daily_rate : 0,
            description: type ? type.description : ''
          };
        });

        filteredEquipment = [...allEquipment];
      } catch (error) {
        showError('載入器材數據失敗');
        console.error(error);
      }
    }

    // ==================== FILTERING ====================

    function filterAndRender() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const selectedStatuses = Array.from(document.querySelectorAll('.status-filter:checked')).map(cb => cb.value);

      filteredEquipment = allEquipment.filter(item => {
        // Search filter
        const matchesSearch = !searchTerm ||
          item.type_name.toLowerCase().includes(searchTerm) ||
          item.internal_code.toLowerCase().includes(searchTerm);

        // Category filter
        const matchesCategory = !selectedCategory || item.category === selectedCategory;

        // Status filter
        const matchesStatus = selectedStatuses.includes(item.status);

        return matchesSearch && matchesCategory && matchesStatus;
      });

      renderProductList(filteredEquipment);
    }

    // ==================== CATEGORY BUTTONS ====================

    function renderCategoryButtons() {
      const container = document.getElementById('category-buttons');
      const categories = ['camera', 'lens', 'audio', 'lighting', 'monitor', 'transmission', 'tripod', 'motion', 'teleprompter', 'accessory', 'prop_furniture', 'prop_wardrobe', 'prop_set', 'prop_fx', 'prop_vehicle', 'prop_other'];
      const categoryLabels = {
        'camera': '攝影機',
        'lens': '鏡頭',
        'audio': '音頻',
        'lighting': '燈光',
        'monitor': '監看',
        'transmission': '傳輸',
        'tripod': '三腳架',
        'motion': '運動鏡頭',
        'teleprompter': '提詞器',
        'accessory': '配件',
        'prop_furniture': '道具-家具',
        'prop_wardrobe': '道具-服裝',
        'prop_set': '道具-場景',
        'prop_fx': '道具-特效',
        'prop_vehicle': '道具-車輛',
        'prop_other': '道具-其他'
      };

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.dataset.category = cat;
        btn.textContent = categoryLabels[cat] || cat;
        container.appendChild(btn);
      });
    }

    // ==================== PRODUCT LIST ====================

    function renderProductList(equipment) {
      const container = document.getElementById('product-list');
      const emptyState = document.getElementById('empty-state');
      const cartSummary = document.getElementById('cart-summary');

      clearElement(container);

      if (equipment.length === 0) {
        container.style.display = 'none';
        emptyState.style.display = 'block';
        cartSummary.style.display = 'none';
        return;
      }

      container.style.display = 'grid';
      emptyState.style.display = 'none';
      if (cart.length > 0) {
        cartSummary.style.display = 'block';
      }

      equipment.forEach(item => {
        const card = document.createElement('div');
        card.className = 'product-card';

        const inCart = cart.some(c => c.unit_id === item.unit_id);

        card.innerHTML = `
          <div class="product-image">
            ${getCategoryEmoji(item.category)}
          </div>
          <div class="product-info">
            <div class="product-category">${getCategoryLabel(item.category)}</div>
            <div class="product-name">${item.type_name}</div>
            <div class="product-desc">
              編碼: ${item.internal_code}
              ${item.serial_number ? `<br>序號: ${item.serial_number}` : ''}
            </div>
            <div class="product-price">${formatCurrency(item.daily_rate)}<span style="font-size: 12px; color: var(--text-secondary);">/日</span></div>
            <div class="product-actions">
              <button class="btn btn-primary btn-sm ${inCart ? 'btn-danger' : ''}" onclick="toggleCart('${item.unit_id}', '${item.type_name}', ${item.daily_rate})">
                ${inCart ? '移除' : '加入'}
              </button>
              <button class="btn btn-outline btn-sm" onclick="showItemDetails(event, '${item.unit_id}')">詳情</button>
            </div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function getCategoryEmoji(category) {
      const emojis = {
        'camera': '📷',
        'lens': '🔭',
        'audio': '🎤',
        'lighting': '💡',
        'monitor': '🖥️',
        'transmission': '📡',
        'tripod': '🎬',
        'motion': '🎥',
        'teleprompter': '📋',
        'accessory': '🔧',
        'prop_furniture': '🪑',
        'prop_wardrobe': '👔',
        'prop_set': '🎭',
        'prop_fx': '💨',
        'prop_vehicle': '🚗',
        'prop_other': '📦'
      };
      return emojis[category] || '📦';
    }

    function getCategoryLabel(category) {
      const labels = {
        'camera': '攝影機',
        'lens': '鏡頭',
        'audio': '音頻',
        'lighting': '燈光',
        'monitor': '監看',
        'transmission': '傳輸',
        'tripod': '三腳架',
        'motion': '運動鏡頭',
        'teleprompter': '提詞器',
        'accessory': '配件',
        'prop_furniture': '道具-家具',
        'prop_wardrobe': '道具-服裝',
        'prop_set': '道具-場景',
        'prop_fx': '道具-特效',
        'prop_vehicle': '道具-車輛',
        'prop_other': '道具-其他'
      };
      return labels[category] || '其他';
    }

    function toggleCart(unitId, typeName, dailyRate) {
      const existingItem = cart.find(c => c.unit_id === unitId);

      if (existingItem) {
        cart = cart.filter(c => c.unit_id !== unitId);
      } else {
        cart.push({
          unit_id: unitId,
          type_name: typeName,
          daily_rate: dailyRate,
          quantity: 1
        });
      }

      updateCartDisplay();
      filterAndRender();
    }

    function updateCartDisplay() {
      const cartSummary = document.getElementById('cart-summary');
      const cartCount = document.getElementById('cart-count');
      const cartTotal = document.getElementById('cart-total');

      if (cart.length === 0) {
        cartSummary.style.display = 'none';
        return;
      }

      cartSummary.style.display = 'block';
      cartCount.textContent = cart.length;

      const total = cart.reduce((sum, item) => sum + item.daily_rate, 0);
      cartTotal.textContent = formatCurrency(total);
    }

    function showItemDetails(e, unitId) {
      e.preventDefault();
      const item = allEquipment.find(i => i.unit_id === unitId);
      if (!item) return;

      const modal = new Modal(`${item.type_name} - 詳情`, `
        <div style="line-height: 1.8; color: var(--text-primary);">
          <p><strong>類型:</strong> ${item.type_name}</p>
          <p><strong>分類:</strong> ${getCategoryLabel(item.category)}</p>
          <p><strong>內部編碼:</strong> ${item.internal_code}</p>
          ${item.serial_number ? `<p><strong>序號:</strong> ${item.serial_number}</p>` : ''}
          <p><strong>日租價格:</strong> ${formatCurrency(item.daily_rate)}</p>
          <p><strong>狀態:</strong> <span class="badge badge-success">可用</span></p>
          ${item.description ? `<p><strong>描述:</strong> ${item.description}</p>` : ''}
          <p><strong>儲存位置:</strong> ${item.location_id || '未指定'}</p>
        </div>
      `, `
        <button class="btn btn-secondary" onclick="document.querySelector('.modal-overlay').remove()">關閉</button>
        <button class="btn btn-primary" onclick="toggleCart('${item.unit_id}', '${item.type_name}', ${item.daily_rate}); document.querySelector('.modal-overlay').remove();">加入購物車</button>
      `);

      modal.open();
    }

    // ==================== CHECKOUT ====================

    function openCheckoutModal() {
      if (cart.length === 0) {
        showWarning('請先選擇器材');
        return;
      }

      const cartItems = cart.map(item => `
        <tr>
          <td>${item.type_name}</td>
          <td>${formatCurrency(item.daily_rate)}</td>
        </tr>
      `).join('');

      const totalAmount = cart.reduce((sum, item) => sum + item.daily_rate, 0);

      const modal = new Modal('申請租借', `
        <form id="checkout-form">
          <div class="rental-form-section">
            <div class="rental-form-title">個人資訊</div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">租借人姓名</label>
                <input type="text" name="name" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">公司名稱</label>
                <input type="text" name="company_name" class="form-input">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">電話</label>
                <input type="tel" name="phone" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">電郵</label>
                <input type="email" name="email" class="form-input">
              </div>
            </div>
          </div>

          <div class="rental-form-section">
            <div class="rental-form-title">租借日期</div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">開始日期</label>
                <input type="date" name="start_date" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label required">結束日期</label>
                <input type="date" name="end_date" class="form-input" required>
              </div>
            </div>
          </div>

          <div class="rental-form-section">
            <div class="rental-form-title">所選器材</div>
            <div class="table-wrapper" style="background-color: var(--light-bg); padding: 12px; border-radius: var(--radius-md);">
              <table style="width: 100%; font-size: 13px;">
                <thead style="background-color: transparent;">
                  <tr style="border-bottom: 2px solid var(--border-color);">
                    <th style="text-align: left; padding: 8px;">器材</th>
                    <th style="text-align: right; padding: 8px;">日租</th>
                  </tr>
                </thead>
                <tbody>
                  ${cartItems}
                </tbody>
                <tfoot style="border-top: 2px solid var(--border-color);">
                  <tr>
                    <td style="padding: 8px; font-weight: 600;">總計 (預估)</td>
                    <td style="text-align: right; padding: 8px; font-weight: 700; color: var(--primary-color);">${formatCurrency(totalAmount)}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
            <p style="font-size: 12px; color: var(--text-secondary); margin-top: 12px;">* 最終金額將根據租借天數計算</p>
          </div>

          <div class="rental-form-section">
            <div class="form-group">
              <label class="form-label">備註</label>
              <textarea name="notes" class="form-textarea" placeholder="如有特殊需求，請在此說明..."></textarea>
            </div>
            <div class="form-checkbox">
              <input type="checkbox" name="accept_terms" required>
              <label>我同意租借條款及細則</label>
            </div>
          </div>
        </form>
      `, `
        <button class="btn btn-secondary" onclick="document.querySelector('.modal-overlay').remove()">取消</button>
        <button class="btn btn-primary" onclick="submitRentalRequest(event)">提交申請</button>
      `);

      modal.open();
    }

    async function submitRentalRequest(e) {
      const form = document.getElementById('checkout-form');
      const validation = validateForm(form);

      if (!validation.valid) {
        showError(validation.errors[0]);
        return;
      }

      const formData = getFormData(form);

      // Check if customer exists, if not create
      try {
        // Find existing customer by phone or email
        const allCustomers = await API.getCustomers();
        let customer = allCustomers.find(c =>
          !c.is_deleted && (
            (formData.email && c.email === formData.email) ||
            (formData.phone && c.phone === formData.phone)
          )
        );

        if (!customer) {
          await API.createCustomer({
            name: formData.name,
            company_name: formData.company_name || '',
            phone: formData.phone,
            email: formData.email || ''
          });

          const updatedCustomers = await API.getCustomers();
          customer = updatedCustomers.find(c =>
            !c.is_deleted && c.phone === formData.phone
          );
        }

        // Create rental
        const rentalData = {
          customer_id: customer.customer_id,
          start_date: formData.start_date,
          end_date: formData.end_date,
          notes: formData.notes,
          status: 'draft',
          total_amount: 0,
          paid_amount: 0
        };

        const rental = await API.createRental(rentalData);

        // Create rental items with type_id for proper rate snapshotting
        for (const item of cart) {
          const unitInfo = allEquipment.find(e => e.unit_id === item.unit_id);
          await API.createRentalItem({
            rental_id: rental.rental_id,
            unit_id: item.unit_id,
            type_id: unitInfo ? unitInfo.type_id : '',
            quantity: 1
          });
        }

        showSuccess('租借申請已提交！我們將盡快與您聯繫');
        document.querySelector('.modal-overlay').remove();

        // Clear cart
        cart = [];
        updateCartDisplay();

        // Reset form
        setTimeout(() => {
          document.getElementById('search-input').value = '';
          filterAndRender();
        }, 1500);
      } catch (error) {
        showError('申請提交失敗: ' + error.message);
      }
    }

    // ==================== TAB SWITCHING ====================

    let currentTab = 'equipment';

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-equipment').classList.toggle('active', tab === 'equipment');
      document.getElementById('tab-venues').classList.toggle('active', tab === 'venues');

      // Toggle visibility
      document.querySelector('.customer-container').style.display = tab === 'equipment' ? '' : 'none';
      document.getElementById('venue-section').style.display = tab === 'venues' ? '' : 'none';

      // Toggle sidebar & cart for equipment only
      document.getElementById('toggle-sidebar').style.display = tab === 'equipment' ? '' : 'none';
      if (tab === 'venues' && !allVenues.length) loadVenues();
      if (tab === 'equipment') updateCartDisplay();
      else document.getElementById('cart-summary').style.display = 'none';
    }

    // ==================== VENUE BROWSING ====================

    let allVenues = [];

    async function loadVenues() {
      try {
        allVenues = await API.getActiveVenues();
        renderVenueList(allVenues);
      } catch (error) {
        showError('載入場地失敗');
        console.error(error);
      }
    }

    // Venue search
    document.getElementById('venue-search-input').addEventListener('input', debounce(() => {
      const query = document.getElementById('venue-search-input').value.toLowerCase();
      const filtered = allVenues.filter(v =>
        (v.name && v.name.toLowerCase().includes(query)) ||
        (v.venue_type && v.venue_type.toLowerCase().includes(query)) ||
        (v.amenities && v.amenities.toLowerCase().includes(query))
      );
      renderVenueList(filtered);
    }, 300));

    const VENUE_TYPE_MAP = {
      studio: { label: '攝影棚', emoji: '🎬' },
      meeting_room: { label: '會議室', emoji: '🏢' },
      event_space: { label: '活動場地', emoji: '🎪' },
      outdoor: { label: '戶外場地', emoji: '🌳' },
      warehouse: { label: '倉庫空間', emoji: '🏭' },
      other: { label: '其他', emoji: '📍' }
    };

    function renderVenueList(venueList) {
      const container = document.getElementById('venue-list');
      const emptyState = document.getElementById('venue-empty-state');

      clearElement(container);

      if (venueList.length === 0) {
        container.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      container.style.display = 'grid';
      emptyState.style.display = 'none';

      venueList.forEach(venue => {
        const vt = VENUE_TYPE_MAP[venue.venue_type] || VENUE_TYPE_MAP.other;
        const card = document.createElement('div');
        card.className = 'product-card';

        const features = [];
        if (venue.has_cyclorama === true || venue.has_cyclorama === 'true') features.push('圓弧牆');
        if (venue.has_blackout === true || venue.has_blackout === 'true') features.push('全遮光');
        if (venue.ceiling_height_m) features.push(`天花板 ${venue.ceiling_height_m}m`);

        card.innerHTML = `
          <div class="product-image">${vt.emoji}</div>
          <div class="product-info">
            <div class="product-category">${vt.label}</div>
            <div class="product-name">${venue.name}</div>
            <div class="product-desc">
              ${venue.max_capacity ? `容納 ${venue.max_capacity} 人` : ''}
              ${venue.floor_area_sqm ? ` / ${venue.floor_area_sqm} 坪` : ''}
              ${features.length ? `<br>${features.join(' / ')}` : ''}
              ${venue.amenities ? `<br>設備：${venue.amenities}` : ''}
            </div>
            <div class="product-price">
              ${formatCurrency(venue.hourly_rate)}<span style="font-size: 12px; color: var(--text-secondary);">/時</span>
              ${venue.daily_rate ? `<span style="font-size: 14px; margin-left: 8px;">${formatCurrency(venue.daily_rate)}/天</span>` : ''}
            </div>
            <div class="product-actions">
              <button class="btn btn-primary btn-sm" onclick="openVenueBookingModal('${venue.venue_id}')">預約場地</button>
              <button class="btn btn-outline btn-sm" onclick="showVenueDetails('${venue.venue_id}')">詳情</button>
            </div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function showVenueDetails(venueId) {
      const venue = allVenues.find(v => v.venue_id === venueId);
      if (!venue) return;
      const vt = VENUE_TYPE_MAP[venue.venue_type] || VENUE_TYPE_MAP.other;

      const modal = new Modal(`${venue.name} - 詳情`, `
        <div style="line-height: 1.8; color: var(--text-primary);">
          <p><strong>類型:</strong> ${vt.label}</p>
          <p><strong>地址:</strong> ${venue.address || '-'}${venue.floor ? ' ' + venue.floor : ''}</p>
          <p><strong>容納人數:</strong> ${venue.max_capacity || '-'} 人</p>
          ${venue.floor_area_sqm ? `<p><strong>面積:</strong> ${venue.floor_area_sqm} 平方公尺</p>` : ''}
          <hr style="margin: 12px 0;">
          <p><strong>時租:</strong> ${formatCurrency(venue.hourly_rate)}/時</p>
          ${venue.half_day_rate ? `<p><strong>半日租:</strong> ${formatCurrency(venue.half_day_rate)}/4hr</p>` : ''}
          ${venue.daily_rate ? `<p><strong>日租:</strong> ${formatCurrency(venue.daily_rate)}/天</p>` : ''}
          <p><strong>最低預約:</strong> ${venue.min_booking_hours || 2} 小時</p>
          <p><strong>可預約時段:</strong> ${venue.available_start_time || '09:00'} ~ ${venue.available_end_time || '22:00'}</p>
          ${venue.amenities ? `<hr style="margin: 12px 0;"><p><strong>設備:</strong> ${venue.amenities}</p>` : ''}
          ${venue.ceiling_height_m ? `<p><strong>天花板高度:</strong> ${venue.ceiling_height_m} 公尺</p>` : ''}
          ${venue.power_specs ? `<p><strong>電力規格:</strong> ${venue.power_specs}</p>` : ''}
          ${venue.parking_info ? `<p><strong>停車:</strong> ${venue.parking_info}</p>` : ''}
          ${venue.rules ? `<hr style="margin: 12px 0;"><p><strong>場地規範:</strong> ${venue.rules}</p>` : ''}
          ${venue.description ? `<p><strong>描述:</strong> ${venue.description}</p>` : ''}
        </div>
      `, `
        <button class="btn btn-secondary" onclick="document.querySelector('.modal-overlay').remove()">關閉</button>
        <button class="btn btn-primary" onclick="document.querySelector('.modal-overlay').remove(); openVenueBookingModal('${venueId}');">預約場地</button>
      `);

      modal.open();
    }

    function openVenueBookingModal(venueId) {
      const venue = allVenues.find(v => v.venue_id === venueId);
      if (!venue) return;

      const rateOptions = [`<option value="hourly">時租 (${formatCurrency(venue.hourly_rate)}/時)</option>`];
      if (venue.half_day_rate) rateOptions.push(`<option value="half_day">半日租 (${formatCurrency(venue.half_day_rate)}/4hr)</option>`);
      if (venue.daily_rate) rateOptions.push(`<option value="daily">日租 (${formatCurrency(venue.daily_rate)}/天)</option>`);

      const modal = new Modal(`預約 ${venue.name}`, `
        <form id="venue-booking-form">
          <input type="hidden" name="venue_id" value="${venueId}">

          <div class="rental-form-section">
            <div class="rental-form-title">個人資訊</div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">姓名</label>
                <input type="text" name="customer_name" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">公司名稱</label>
                <input type="text" name="company_name" class="form-input">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">電話</label>
                <input type="tel" name="phone" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">電郵</label>
                <input type="email" name="email" class="form-input">
              </div>
            </div>
          </div>

          <div class="rental-form-section">
            <div class="rental-form-title">預約時段</div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">開始時間</label>
                <input type="datetime-local" name="booking_start" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label required">結束時間</label>
                <input type="datetime-local" name="booking_end" class="form-input" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label required">計費方式</label>
                <select name="rate_type" class="form-select" required>
                  ${rateOptions.join('')}
                </select>
              </div>
              <div class="form-group">
                <label class="form-label required">數量</label>
                <input type="number" name="rate_quantity" class="form-input" value="1" min="1" step="0.5" required>
              </div>
            </div>
          </div>

          <div class="rental-form-section">
            <div class="rental-form-title">其他</div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">預計人數</label>
                <input type="number" name="attendee_count" class="form-input" min="1">
              </div>
              <div class="form-group">
                <label class="form-label">使用目的</label>
                <input type="text" name="use_purpose" class="form-input" placeholder="例：商品攝影">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">特殊需求</label>
              <textarea name="special_requirements" class="form-textarea" placeholder="例：需全遮光、需佈置"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">備註</label>
              <textarea name="notes" class="form-textarea"></textarea>
            </div>
            <div class="form-checkbox">
              <input type="checkbox" name="accept_terms" required>
              <label>我同意場地租借條款及細則</label>
            </div>
          </div>
        </form>
      `, `
        <button class="btn btn-secondary" onclick="document.querySelector('.modal-overlay').remove()">取消</button>
        <button class="btn btn-primary" onclick="submitVenueBooking(event)">提交預約</button>
      `);

      modal.open();
    }

    async function submitVenueBooking(e) {
      const form = document.getElementById('venue-booking-form');
      const validation = validateForm(form);

      if (!validation.valid) {
        showError(validation.errors[0]);
        return;
      }

      const formData = getFormData(form);

      try {
        // Find or create customer
        const allCustomers = await API.getCustomers();
        let customer = allCustomers.find(c =>
          !c.is_deleted && (
            (formData.email && c.email === formData.email) ||
            (formData.phone && c.phone === formData.phone)
          )
        );

        if (!customer) {
          await API.createCustomer({
            name: formData.customer_name,
            company_name: formData.company_name || '',
            phone: formData.phone,
            email: formData.email || ''
          });
          const updatedCustomers = await API.getCustomers();
          customer = updatedCustomers.find(c => !c.is_deleted && c.phone === formData.phone);
        }

        // Create venue booking
        const bookingData = {
          venue_id: formData.venue_id,
          customer_id: customer.customer_id,
          booking_start: formData.booking_start,
          booking_end: formData.booking_end,
          rate_type: formData.rate_type,
          rate_quantity: formData.rate_quantity || 1,
          attendee_count: formData.attendee_count || '',
          use_purpose: formData.use_purpose || '',
          special_requirements: formData.special_requirements || '',
          notes: formData.notes || ''
        };

        await API.createVenueBooking(bookingData);
        showSuccess('場地預約已提交！我們將盡快與您確認');
        document.querySelector('.modal-overlay').remove();
      } catch (error) {
        showError('預約提交失敗: ' + error.message);
      }
    }
  </script>
</head>
</html>

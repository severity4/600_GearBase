name: Deploy to Google Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate with Google
        run: |
          echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Push to Apps Script
        run: clasp push --force

      - name: Create new deployment version
        if: github.event_name == 'push'
        run: |
          DEPLOY_ID=$(clasp deployments | grep -oP 'AKfycb[^\s]+' | head -1)
          if [ -n "$DEPLOY_ID" ]; then
            clasp deploy -i "$DEPLOY_ID" -d "Auto-deploy from GitHub $(date +%Y-%m-%d_%H:%M)"
          else
            clasp deploy -d "Auto-deploy from GitHub $(date +%Y-%m-%d_%H:%M)"
          fi

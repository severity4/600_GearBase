<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ==================== CSS Variables / Theming ==================== */
    :root {
      --primary-color: #3b82f6;
      --primary-dark: #1e40af;
      --primary-light: #dbeafe;
      --secondary-color: #8b5cf6;
      --success-color: #10b981;
      --danger-color: #ef4444;
      --warning-color: #f59e0b;
      --info-color: #06b6d4;
      --dark-bg: #1e293b;
      --dark-bg-secondary: #334155;
      --light-bg: #f8fafc;
      --border-color: #e2e8f0;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-light: #cbd5e1;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --transition: all 0.3s ease;
    }

    /* ==================== Global Styles ==================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--light-bg);
      color: var(--text-primary);
      line-height: 1.5;
      height: 100%;
    }

    body.dark-mode {
      background-color: var(--dark-bg);
      color: #e2e8f0;
    }

    a {
      color: var(--primary-color);
      text-decoration: none;
      transition: var(--transition);
    }

    a:hover {
      color: var(--primary-dark);
    }

    /* ==================== Layout ==================== */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .flex {
      display: flex;
    }

    .flex-column {
      flex-direction: column;
    }

    .flex-wrap {
      flex-wrap: wrap;
    }

    .justify-between {
      justify-content: space-between;
    }

    .justify-center {
      justify-content: center;
    }

    .align-center {
      align-items: center;
    }

    .gap-1 { gap: 8px; }
    .gap-2 { gap: 16px; }
    .gap-3 { gap: 24px; }
    .gap-4 { gap: 32px; }

    .mt-1 { margin-top: 8px; }
    .mt-2 { margin-top: 16px; }
    .mt-3 { margin-top: 24px; }
    .mt-4 { margin-top: 32px; }

    .mb-1 { margin-bottom: 8px; }
    .mb-2 { margin-bottom: 16px; }
    .mb-3 { margin-bottom: 24px; }
    .mb-4 { margin-bottom: 32px; }

    .p-1 { padding: 8px; }
    .p-2 { padding: 16px; }
    .p-3 { padding: 24px; }
    .p-4 { padding: 32px; }

    .px-2 { padding-left: 16px; padding-right: 16px; }
    .py-2 { padding-top: 16px; padding-bottom: 16px; }

    .w-100 { width: 100%; }
    .h-100 { height: 100%; }

    .app-wrapper {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background-color: var(--dark-bg);
      color: white;
      overflow-y: auto;
      border-right: 1px solid var(--dark-bg-secondary);
      flex-shrink: 0;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background-color: white;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* ==================== Sidebar Navigation ==================== */
    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--dark-bg-secondary);
      margin-bottom: 20px;
    }

    .sidebar-logo {
      font-size: 18px;
      font-weight: bold;
      color: var(--primary-light);
    }

    .sidebar-subtitle {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }

    .nav-section {
      margin-bottom: 20px;
      padding: 0 8px;
    }

    .nav-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-light);
      padding: 8px 8px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 12px;
      color: var(--text-light);
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: var(--transition);
      font-size: 14px;
    }

    .nav-item:hover {
      background-color: var(--dark-bg-secondary);
      color: white;
    }

    .nav-item.active {
      background-color: var(--primary-color);
      color: white;
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ==================== Cards ==================== */
    .card {
      background-color: white;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    .card-header {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .card.dark {
      background-color: var(--dark-bg-secondary);
      color: white;
      border-color: var(--dark-bg);
    }

    /* ==================== Buttons ==================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-dark);
    }

    .btn-secondary {
      background-color: var(--dark-bg);
      color: white;
    }

    .btn-secondary:hover {
      background-color: var(--dark-bg-secondary);
    }

    .btn-success {
      background-color: var(--success-color);
      color: white;
    }

    .btn-success:hover {
      opacity: 0.9;
    }

    .btn-danger {
      background-color: var(--danger-color);
      color: white;
    }

    .btn-danger:hover {
      opacity: 0.9;
    }

    .btn-warning {
      background-color: var(--warning-color);
      color: white;
    }

    .btn-outline {
      background-color: transparent;
      color: var(--primary-color);
      border: 1px solid var(--primary-color);
    }

    .btn-outline:hover {
      background-color: var(--primary-light);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
    }

    .btn-lg {
      padding: 14px 24px;
      font-size: 16px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ==================== Forms ==================== */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-primary);
      font-size: 14px;
    }

    .form-label.required::after {
      content: ' *';
      color: var(--danger-color);
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-family: inherit;
      transition: var(--transition);
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-row.three {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-checkbox input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* ==================== Tables ==================== */
    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
    }

    thead {
      background-color: var(--light-bg);
      border-bottom: 2px solid var(--border-color);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      font-size: 14px;
    }

    tbody tr:hover {
      background-color: var(--light-bg);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .table-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    /* ==================== Badges ==================== */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-primary {
      background-color: var(--primary-light);
      color: var(--primary-dark);
    }

    .badge-success {
      background-color: #dcfce7;
      color: #166534;
    }

    .badge-danger {
      background-color: #fee2e2;
      color: #991b1b;
    }

    .badge-warning {
      background-color: #fef3c7;
      color: #92400e;
    }

    .badge-info {
      background-color: #cffafe;
      color: #164e63;
    }

    /* ==================== Modals ==================== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background-color: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: var(--transition);
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal-body {
      padding: 24px;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    /* ==================== Alerts & Notifications ==================== */
    .alert {
      padding: 16px;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .alert-success {
      background-color: #dcfce7;
      color: #166534;
      border-left: 4px solid var(--success-color);
    }

    .alert-danger {
      background-color: #fee2e2;
      color: #991b1b;
      border-left: 4px solid var(--danger-color);
    }

    .alert-warning {
      background-color: #fef3c7;
      color: #92400e;
      border-left: 4px solid var(--warning-color);
    }

    .alert-info {
      background-color: #cffafe;
      color: #164e63;
      border-left: 4px solid var(--info-color);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: var(--text-primary);
      color: white;
      padding: 16px 24px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      animation: slideInRight 0.3s ease;
      z-index: 2000;
      max-width: 400px;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100%);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .toast.success {
      background-color: var(--success-color);
    }

    .toast.danger {
      background-color: var(--danger-color);
    }

    .toast.warning {
      background-color: var(--warning-color);
    }

    /* ==================== Loading Spinner ==================== */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner-large {
      width: 40px;
      height: 40px;
      border-width: 4px;
    }

    /* ==================== Stat Cards ==================== */
    .stat-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 20px;
      border: 1px solid var(--border-color);
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary-color);
      margin: 12px 0;
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .stat-change {
      font-size: 12px;
      margin-top: 8px;
    }

    .stat-change.positive {
      color: var(--success-color);
    }

    .stat-change.negative {
      color: var(--danger-color);
    }

    /* ==================== Grid Layout ==================== */
    .grid {
      display: grid;
      gap: 20px;
    }

    .grid-2 {
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    }

    .grid-4 {
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }

    /* ==================== Catalog Grid ==================== */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .product-card {
      background: white;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border-color);
      transition: var(--transition);
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-4px);
    }

    .product-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, var(--primary-light) 0%, #f0f9ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: var(--text-secondary);
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-info {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-name {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .product-category {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 12px;
    }

    .product-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }

    /* ==================== Search Bar ==================== */
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background-color: white;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .search-icon {
      color: var(--text-secondary);
    }

    /* ==================== Responsive Design ==================== */
    @media (max-width: 768px) {
      .app-wrapper {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--dark-bg-secondary);
      }

      .content {
        padding: 16px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .form-row.three {
        grid-template-columns: 1fr;
      }

      .grid-2, .grid-3, .grid-4 {
        grid-template-columns: 1fr;
      }

      .product-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }

      .modal {
        width: 95%;
      }

      .toast {
        left: 10px;
        right: 10px;
        bottom: 10px;
      }

      table {
        font-size: 12px;
      }

      td, th {
        padding: 8px;
      }

      .btn {
        padding: 8px 12px;
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      .header {
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }

      .product-grid {
        grid-template-columns: 1fr;
      }

      .modal-footer {
        flex-direction: column;
      }

      .modal-footer .btn {
        width: 100%;
      }
    }
  </style>
</head>
</html>
